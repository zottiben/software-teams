# Software Teams — GitHub Actions Workflow
# Copy this file to .github/workflows/software-teams.yml in your repository
#
# Prerequisites:
#   1. Set ANTHROPIC_API_KEY secret in your repo settings
#   2. That's it — Software Teams bootstraps everything else automatically
#
# Optional:
#   - Set CLICKUP_API_TOKEN secret for ClickUp ticket integration
#   - Set DATADOG_API_KEY and DATADOG_APP_KEY secrets for Datadog Error
#     Tracking integration (both required; PII is scrubbed before any
#     Datadog content lands in an agent prompt — see docs)
#   - Set SOFTWARE_TEAMS_COMMIT_RULES=true repo variable to persist rules in git
#   - Set SOFTWARE_TEAMS_RULES_REPO variable to push rules to a central repo (e.g. org/software-teams-rules)
#   - Set SOFTWARE_TEAMS_RULES_TOKEN secret (PAT with Contents read/write on the rules repo)
#   - Run `bunx @websitelabs/software-teams init` locally to customise framework files
#
# Usage: Comment on any issue or PR with "Hey Software Teams" followed by a command:
#   Hey Software Teams plan <description>        — Create an implementation plan
#   Hey Software Teams quick <description>       — Make a small, focused change
#   Hey Software Teams review                    — Review the current PR
#   Hey Software Teams feedback                  — Address PR review comments
#   Hey Software Teams do <clickup-ticket-url>   — Full flow: plan + implement from ticket
#   Hey Software Teams ping                      — Check framework status
#
# Auto-pickup: open or label any issue with the 'software-teams' label and the
# workflow runs the planner automatically. The generated plan is posted as an
# issue comment; reply 'approved' to advance to implementation.
#
# Conversation: Software Teams supports back-and-forth iteration. After Software Teams responds,
# reply with feedback to refine, or say "approved" to finalise.
#
# Rules: Software Teams accumulates team rules across PRs automatically. New rules are
# appended to .software-teams/rules/ only when the same guidance is NOT already in the
# project's .claude/CLAUDE.md (or ./CLAUDE.md). By default rules live in the GitHub
# Actions cache. Set SOFTWARE_TEAMS_COMMIT_RULES=true to persist them in git
# (recommended — cache entries expire after 7 days of inactivity).

name: Software Teams

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  issues:
    types: [opened, labeled, closed]
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ── Triggered by "Hey Software Teams" comments on issues/PRs or PR reviews ──
  software-teams:
    if: >-
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, 'Hey Software Teams'))
      || (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, 'Hey Software Teams'))
      || (github.event_name == 'pull_request_review' && contains(github.event.review.body, 'Hey Software Teams'))
    runs-on: ubuntu-latest
    steps:
      # Bun is required to run the Software Teams CLI
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      # Resolve the PR head branch
      # - issue_comment: github.head_ref is empty, resolve via API
      # - pull_request_review / pull_request_review_comment: github.event.pull_request.head.ref is available
      - name: Resolve PR branch
        id: pr
        run: |
          bunx @websitelabs/software-teams@latest action resolve-branch \
            --repo "$REPO" \
            ${PR_HEAD_REF:+--pr-head-ref "$PR_HEAD_REF"} \
            ${PR_NUMBER:+--pr-number "$PR_NUMBER"}
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref || '' }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}

      - uses: actions/checkout@v4
        with:
          ref: ${{ steps.pr.outputs.branch || github.head_ref || github.ref }}

      # Restore persisted Software Teams state (rules + codebase-index)
      # 1. Exact match for this branch
      # 2. Fall back to main baseline (rules only — plans are cleared below)
      - name: Restore Software Teams state
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-${{ steps.pr.outputs.branch || github.head_ref || github.ref_name }}
          restore-keys: |
            software-teams-state-v2-${{ github.repository }}-${{ steps.pr.outputs.branch || github.head_ref || github.ref_name }}-
            software-teams-state-v2-${{ github.repository }}-main

      # Bootstrap Software Teams framework if not present (first run or cache miss)
      - name: Bootstrap Software Teams
        run: |
          bunx @websitelabs/software-teams@latest action bootstrap --matched-key "${{ steps.cache.outputs.cache-matched-key }}"

      # Fetch shared rules from an external repo if configured.
      # This merges cross-project rules into the local .software-teams/rules/ before agents run.
      # Lines that already appear in the project's CLAUDE.md are filtered out automatically.
      - name: Fetch shared rules
        if: vars.SOFTWARE_TEAMS_RULES_REPO != ''
        run: |
          bunx @websitelabs/software-teams@latest action fetch-rules --rules-repo "$RULES_REPO"
        env:
          RULES_REPO: ${{ vars.SOFTWARE_TEAMS_RULES_REPO }}
          RULES_TOKEN: ${{ secrets.SOFTWARE_TEAMS_RULES_TOKEN || github.token }}

      # Configure git for Software Teams commits (used when implementing changes on PR branches)
      - name: Configure git
        run: |
          git config user.name "software-teams[bot]"
          git config user.email "software-teams[bot]@users.noreply.github.com"

      # Install Claude Code CLI (required by Software Teams for AI invocations).
      # `--trust` is required: claude-code ships a placeholder `bin/claude.exe`
      # and materialises the real native binary in a postinstall script. Bun
      # blocks postinstall scripts by default, so without `--trust` the stub is
      # left in place and posix_spawn fails with ENOEXEC at runtime.
      - name: Install Claude Code
        run: bun install -g --trust @anthropic-ai/claude-code

      # Run Software Teams CLI directly — full pipeline with routing, agents, and comment posting
      # IMPORTANT: All user input is passed via env vars to avoid shell injection.
      # All arguments are individually quoted to prevent shell expansion.
      #
      # Auth gate (opt-in):
      #   Set repo variable SOFTWARE_TEAMS_AUTH_ENABLED=true to restrict Software Teams to write collaborators.
      #   Set SOFTWARE_TEAMS_ALLOWED_USERS to a comma-separated list for explicit allow-listing.
      - name: Run Software Teams
        run: |
          bunx @websitelabs/software-teams@latest action run "$COMMENT_BODY" \
            --repo "$REPO" \
            ${COMMENT_ID:+--comment-id "$COMMENT_ID"} \
            ${PR_NUMBER:+--pr-number "$PR_NUMBER"} \
            ${ISSUE_NUMBER:+--issue-number "$ISSUE_NUMBER"} \
            ${COMMENT_AUTHOR:+--comment-author "$COMMENT_AUTHOR"} \
            ${ALLOWED_USERS:+--allowed-users "$ALLOWED_USERS"}
        env:
          # Resolve comment body from whichever event type triggered this
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body || '' }}
          COMMENT_ID: ${{ github.event.comment.id || github.event.review.id || '' }}
          PR_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
          ISSUE_NUMBER: ${{ github.event.issue.number || github.event.pull_request.number || '' }}
          COMMENT_AUTHOR: ${{ github.event.comment.user.login || github.event.review.user.login || '' }}
          REPO: ${{ github.repository }}
          SOFTWARE_TEAMS_AUTH_ENABLED: ${{ vars.SOFTWARE_TEAMS_AUTH_ENABLED || '' }}
          SOFTWARE_TEAMS_MODEL: ${{ vars.SOFTWARE_TEAMS_MODEL || '' }}
          ALLOWED_USERS: ${{ vars.SOFTWARE_TEAMS_ALLOWED_USERS || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          GH_TOKEN: ${{ github.token }}

      # Save Software Teams state — rules, config, persistence all cached together
      - name: Save Software Teams state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-${{ steps.pr.outputs.branch || github.head_ref || github.ref_name }}-${{ github.run_id }}

  software-teams-issue-label:
    # Fires ONLY on `labeled` events (never on `opened`). GitHub emits
    # a `labeled` event for every label present at issue creation as
    # well as labels added later — so this single condition covers
    # both "opened with the trigger label" and "trigger label added
    # after the fact" without the double-fire bug we hit pre-0.5.41
    # (a single user action could trigger two workflow runs in the
    # same second when `opened` + `labeled` both matched).
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'labeled'
      && github.event.label.name == 'software-teams'
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.repository.default_branch }}
      - name: Restore Software Teams state
        id: cache
        uses: actions/cache/restore@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main
          restore-keys: |
            software-teams-state-v2-${{ github.repository }}-main
      - name: Bootstrap Software Teams
        run: |
          bunx @websitelabs/software-teams@latest action bootstrap --matched-key "${{ steps.cache.outputs.cache-matched-key }}"
      - name: Fetch shared rules
        if: vars.SOFTWARE_TEAMS_RULES_REPO != ''
        run: |
          bunx @websitelabs/software-teams@latest action fetch-rules --rules-repo "$RULES_REPO"
        env:
          RULES_REPO: ${{ vars.SOFTWARE_TEAMS_RULES_REPO }}
          RULES_TOKEN: ${{ secrets.SOFTWARE_TEAMS_RULES_TOKEN || github.token }}
      - name: Configure git
        run: |
          git config user.name "software-teams[bot]"
          git config user.email "software-teams[bot]@users.noreply.github.com"
      - name: Install Claude Code
        run: bun install -g --trust @anthropic-ai/claude-code
      - name: Run Software Teams
        run: |
          bunx @websitelabs/software-teams@latest action run "" \
            --event-type issue_labeled \
            --repo "$REPO" \
            --issue-number "$ISSUE_NUMBER" \
            ${COMMENT_AUTHOR:+--comment-author "$COMMENT_AUTHOR"} \
            ${ALLOWED_USERS:+--allowed-users "$ALLOWED_USERS"}
        env:
          ISSUE_NUMBER: ${{ github.event.issue.number }}
          COMMENT_AUTHOR: ${{ github.event.action == 'labeled' && github.event.sender.login || github.event.issue.user.login }}
          REPO: ${{ github.repository }}
          SOFTWARE_TEAMS_AUTH_ENABLED: ${{ vars.SOFTWARE_TEAMS_AUTH_ENABLED || '' }}
          SOFTWARE_TEAMS_MODEL: ${{ vars.SOFTWARE_TEAMS_MODEL || '' }}
          ALLOWED_USERS: ${{ vars.SOFTWARE_TEAMS_ALLOWED_USERS || '' }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          DATADOG_API_KEY: ${{ secrets.DATADOG_API_KEY }}
          DATADOG_APP_KEY: ${{ secrets.DATADOG_APP_KEY }}
          GH_TOKEN: ${{ github.token }}

      # Save Software Teams state — plan files written by the planner must
      # land in the cache so the implement comment that follows can find
      # them. Missing this step was the cause of the issue #54 "no plan
      # found" regression. See workflow-yaml.test.ts regression guard.
      - name: Save Software Teams state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main-${{ github.run_id }}

  # ── Prune plans when a labelled issue is closed without a merge ──
  # The promote-rules job already covers the PR-merge path. This job
  # handles the case where a user closes an issue manually (no PR opened,
  # or PR closed without merging). Gated by the `software-teams` label so
  # we don't burn CI minutes on unrelated issue closes.
  software-teams-issue-close:
    if: >-
      github.event_name == 'issues'
      && github.event.action == 'closed'
      && contains(github.event.issue.labels.*.name, 'software-teams')
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - uses: actions/checkout@v4

      # Restore from the main baseline — that's where stale plans accumulate.
      - name: Restore main-baseline state
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main-issue-close-${{ github.event.issue.number }}-${{ github.run_id }}
          restore-keys: |
            software-teams-state-v2-${{ github.repository }}-main

      - name: Prune plans for closed issue
        id: prune
        if: steps.restore.outputs.cache-hit != ''
        run: |
          bunx @websitelabs/software-teams@latest action prune-plans \
            --repo "$REPO" \
            --issue-number "${{ github.event.issue.number }}"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      # Only re-save when pruning actually changed something — avoids cache
      # churn when the closed issue had no Software Teams plan.
      - name: Save pruned state as new main baseline
        if: steps.prune.outputs.pruned == 'true'
        uses: actions/cache/save@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main-issue-close-${{ github.event.issue.number }}-${{ github.run_id }}

  # ── Promote rules to main baseline when PRs merge ──
  # Only runs when Software Teams was actually used on the merged PR
  promote-rules:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Check if Software Teams was involved
        id: check
        run: |
          bunx @websitelabs/software-teams@latest action promote-rules \
            --check-only \
            --repo "$REPO" \
            --sha "${{ github.sha }}"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - uses: actions/checkout@v4
        if: steps.check.outputs.skip != 'true'

      - name: Restore Software Teams state from merged branch
        if: steps.check.outputs.skip != 'true'
        id: restore
        uses: actions/cache/restore@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main-promotion-${{ github.sha }}
          restore-keys: |
            software-teams-state-v2-${{ github.repository }}-${{ steps.check.outputs.branch }}-

      # Prune plans tagged with any issue this PR closes (`Closes #N` etc.).
      # Without this, the merged plan files would bleed into the main baseline
      # cache and a new label-triggered run on a different issue would still
      # see the old plan as "active."
      - name: Prune plans for merged issue(s)
        if: steps.check.outputs.skip != 'true' && steps.restore.outputs.cache-hit != '' && steps.check.outputs.pr_number != ''
        run: |
          bunx @websitelabs/software-teams@latest action prune-plans \
            --repo "$REPO" \
            --pr-number "${{ steps.check.outputs.pr_number }}"
        env:
          GH_TOKEN: ${{ github.token }}
          REPO: ${{ github.repository }}

      - name: Promote to main baseline
        if: steps.check.outputs.skip != 'true' && steps.restore.outputs.cache-hit != ''
        uses: actions/cache/save@v4
        with:
          path: |
            .software-teams/persistence/
            .software-teams/rules/
            .software-teams/config/
            .software-teams/plans/
            .claude/
          key: software-teams-state-v2-${{ github.repository }}-main-${{ github.sha }}

      # Opt-in: commit rules so they survive cache eviction.
      # Set repo variable SOFTWARE_TEAMS_COMMIT_RULES=true to enable.
      #
      # Where rules are committed:
      #   - Same repo (default): .software-teams/rules/ on main
      #   - External repo: set SOFTWARE_TEAMS_RULES_REPO (e.g. org/software-teams-rules)
      #     and SOFTWARE_TEAMS_RULES_TOKEN secret. Rules are stored under
      #     software-teams/rules/ in the external repo and merged (not replaced).
      - name: Commit rules to repo
        if: >-
          steps.check.outputs.skip != 'true'
          && steps.restore.outputs.cache-hit != ''
          && vars.SOFTWARE_TEAMS_COMMIT_RULES == 'true'
        run: |
          git config user.name "software-teams[bot]"
          git config user.email "software-teams[bot]@users.noreply.github.com"
          bunx @websitelabs/software-teams@latest action promote-rules \
            --repo "$REPO" \
            --sha "${{ github.sha }}" \
            --pr-number "${{ steps.check.outputs.pr_number }}" \
            --branch "${{ steps.check.outputs.branch }}" \
            ${RULES_REPO:+--rules-repo "$RULES_REPO"}
        env:
          RULES_REPO: ${{ vars.SOFTWARE_TEAMS_RULES_REPO || '' }}
          RULES_TOKEN: ${{ secrets.SOFTWARE_TEAMS_RULES_TOKEN || github.token }}
