# Jedi AI Developer — GitHub Actions Workflow
# Copy this file to .github/workflows/jedi.yml in your repository
#
# Prerequisites:
#   1. Set ANTHROPIC_API_KEY secret in your repo settings
#   2. That's it — Jedi bootstraps everything else automatically
#
# Optional:
#   - Set CLICKUP_API_TOKEN secret for ClickUp ticket integration
#   - Run `npx @benzotti/jedi init` locally to customise framework files
#
# Usage: Comment on any issue or PR with "Hey Jedi" followed by a command:
#   Hey Jedi plan <description>        — Create an implementation plan
#   Hey Jedi quick <description>       — Make a small, focused change
#   Hey Jedi review                    — Review the current PR
#   Hey Jedi feedback                  — Address PR review comments
#   Hey Jedi do <clickup-ticket-url>   — Full flow: plan + implement from ticket
#   Hey Jedi ping                      — Check framework status
#
# Conversation: Jedi supports back-and-forth iteration. After Jedi responds,
# reply with feedback to refine, or say "approved" to finalise.
#
# Learnings: Jedi accumulates team preferences across PRs automatically.
# No files to commit — everything lives in the GitHub Actions cache.

name: Jedi

on:
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]
  push:
    branches: [main, master]

permissions:
  contents: write
  pull-requests: write
  issues: write
  id-token: write

jobs:
  # ── Triggered by "Hey Jedi" comments on issues/PRs ──
  jedi:
    if: >-
      (github.event_name == 'issue_comment' || github.event_name == 'pull_request_review_comment')
      && contains(github.event.comment.body, 'Hey Jedi')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.head_ref || github.ref }}

      # Restore persisted Jedi state (learnings + codebase-index)
      # 1. Exact match for this branch
      # 2. Fall back to main baseline (learnings only — plans are cleared below)
      - name: Restore Jedi state
        id: cache
        uses: actions/cache@v4
        with:
          path: |
            .jdi/persistence/
            .jdi/framework/
            .jdi/config/
            .claude/
          key: jedi-state-${{ github.repository }}-${{ github.head_ref || github.ref_name }}
          restore-keys: |
            jedi-state-${{ github.repository }}-main

      # Bun is required to run the Jedi CLI
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # Bootstrap Jedi framework if not present (first run or cache miss)
      - name: Bootstrap Jedi
        run: |
          if [ ! -d ".jdi/framework" ]; then
            bunx @benzotti/jedi@latest init --ci
          fi
          mkdir -p .jdi/persistence

          # If cache was restored from fallback (not exact branch match),
          # clear plans and state — they're branch-local, only learnings carry forward
          if [ "${{ steps.cache.outputs.cache-hit }}" != "true" ]; then
            echo "Cache miss or fallback — clearing plan state"
            rm -rf .jdi/plans/*
            mkdir -p .jdi/config
            printf 'active_plan: null\ncurrent_wave: null\nmode: null\n' > .jdi/config/state.yaml
          fi

          # Exclude Jedi working directories from git so they don't get committed
          # or conflict with branch checkouts — they live in the cache only
          mkdir -p .git/info
          for pattern in '.jdi/' '.claude/'; do
            grep -qxF "$pattern" .git/info/exclude 2>/dev/null || echo "$pattern" >> .git/info/exclude
          done

      # Install Claude Code CLI (required by Jedi for AI invocations)
      - name: Install Claude Code
        run: bun install -g @anthropic-ai/claude-code

      # Run Jedi CLI directly — full pipeline with routing, agents, and comment posting
      - name: Run Jedi
        run: |
          COMMENT_BODY="${{ github.event.comment.body }}"
          COMMENT_ID="${{ github.event.comment.id }}"
          PR_NUMBER="${{ github.event.issue.pull_request && github.event.issue.number || '' }}"
          ISSUE_NUMBER="${{ github.event.issue.number }}"

          ARGS="--repo ${{ github.repository }}"
          [ -n "$COMMENT_ID" ] && ARGS="$ARGS --comment-id $COMMENT_ID"
          [ -n "$PR_NUMBER" ] && ARGS="$ARGS --pr-number $PR_NUMBER"
          [ -n "$ISSUE_NUMBER" ] && ARGS="$ARGS --issue-number $ISSUE_NUMBER"

          bunx @benzotti/jedi@latest action "$COMMENT_BODY" $ARGS
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLICKUP_API_TOKEN: ${{ secrets.CLICKUP_API_TOKEN }}
          GH_TOKEN: ${{ github.token }}

      # Save Jedi state — framework, config, persistence all cached together
      - name: Save Jedi state
        if: always()
        uses: actions/cache/save@v4
        with:
          path: |
            .jdi/persistence/
            .jdi/framework/
            .jdi/config/
            .claude/
          key: jedi-state-${{ github.repository }}-${{ github.head_ref || github.ref_name }}-${{ github.run_id }}

  # ── Promote learnings to main baseline when PRs merge ──
  promote-learnings:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Restore latest Jedi state
        id: restore
        uses: actions/cache@v4
        with:
          path: |
            .jdi/persistence/
            .jdi/framework/
            .jdi/config/
            .claude/
          key: jedi-state-${{ github.repository }}-main-promotion-${{ github.sha }}
          restore-keys: |
            jedi-state-${{ github.repository }}-

      - name: Promote to main baseline
        if: steps.restore.outputs.cache-hit != ''
        uses: actions/cache/save@v4
        with:
          path: |
            .jdi/persistence/
            .jdi/framework/
            .jdi/config/
            .claude/
          key: jedi-state-${{ github.repository }}-main-${{ github.sha }}
