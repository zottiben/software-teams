name: 'Software Teams AI Developer'
description: 'AI-powered development workflows using the Software Teams framework. Delegates to the provider-agnostic composite with provider: anthropic for full backward compatibility.'
author: 'benzotti'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key for Claude'
    required: true
  clickup_api_token:
    description: 'ClickUp API token for ticket fetching (optional)'
    required: false
    default: ''
  allowed_users:
    description: 'Comma-separated GitHub usernames allowed to trigger (empty = repo collaborators with write access)'
    required: false
    default: ''
  trigger_phrase:
    description: 'The trigger phrase to look for in comments'
    required: false
    default: 'Hey software-teams'
  software_teams_version:
    description: 'Version of @websitelabs/software-teams to install for init'
    required: false
    default: 'latest'
  claude_code_action_version:
    description: 'Version of anthropic/claude-code-action to use'
    required: false
    default: 'v1'

outputs:
  session_id:
    description: 'Claude Code session ID for conversation continuity'
    value: ${{ steps.multiprovider.outputs.session_id }}
  execution_file:
    description: 'Path to Claude Code execution output'
    value: ${{ steps.multiprovider.outputs.execution_file }}

runs:
  using: 'composite'
  steps:
    # Compat shim: delegate to the provider-agnostic composite with provider: anthropic.
    # All existing inputs are forwarded unchanged so existing callers see zero behaviour change.
    # To use a different provider, call action-multiprovider directly and set provider accordingly.
    - name: Run via provider-agnostic composite (anthropic)
      id: multiprovider
      uses: ./action-multiprovider
      with:
        provider: 'anthropic'
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        clickup_api_token: ${{ inputs.clickup_api_token }}
        allowed_users: ${{ inputs.allowed_users }}
        trigger_phrase: ${{ inputs.trigger_phrase }}
        software_teams_version: ${{ inputs.software_teams_version }}
        claude_code_action_version: ${{ inputs.claude_code_action_version }}

branding:
  icon: 'zap'
  color: 'purple'
