name: 'Software Teams AI Developer'
description: 'AI-powered development workflows using the Software Teams framework, powered by anthropic/claude-code-action'
author: 'benzotti'

inputs:
  anthropic_api_key:
    description: 'Anthropic API key for Claude'
    required: true
  clickup_api_token:
    description: 'ClickUp API token for ticket fetching (optional)'
    required: false
    default: ''
  allowed_users:
    description: 'Comma-separated GitHub usernames allowed to trigger (empty = repo collaborators with write access)'
    required: false
    default: ''
  trigger_phrase:
    description: 'The trigger phrase to look for in comments'
    required: false
    default: 'Hey software-teams'
  software_teams_version:
    description: 'Version of @websitelabs/software-teams to install for init'
    required: false
    default: 'latest'
  claude_code_action_version:
    description: 'Version of anthropic/claude-code-action to use'
    required: false
    default: 'v1'

outputs:
  session_id:
    description: 'Claude Code session ID for conversation continuity'
    value: ${{ steps.claude.outputs.session_id }}
  execution_file:
    description: 'Path to Claude Code execution output'
    value: ${{ steps.claude.outputs.execution_file }}

runs:
  using: 'composite'
  steps:
    # Bun is required to run the Software Teams CLI
    - name: Setup Bun
      uses: oven-sh/setup-bun@v2
      with:
        bun-version: latest

    # Ensure Software Teams framework is initialised in the repo
    - name: Bootstrap Software Teams framework
      shell: bash
      run: |
        if [ ! -d ".software-teams/framework" ]; then
          echo "Software Teams framework not found — initialising..."
          bunx @websitelabs/software-teams@${{ inputs.software_teams_version }} init --ci
        fi

        # Ensure persistence directory exists
        mkdir -p .software-teams/persistence

    # Run Claude Code Action with Software Teams-specific configuration
    - name: Run Claude with Software Teams framework
      id: claude
      uses: anthropics/claude-code-action@${{ inputs.claude_code_action_version }}
      with:
        anthropic_api_key: ${{ inputs.anthropic_api_key }}
        trigger_phrase: ${{ inputs.trigger_phrase }}
        prompt: |
          You are Software Teams, an AI development framework that uses specialised agents to plan, implement, review, and ship features.

          IMPORTANT: You are running inside a GitHub Action. Your final text response will be posted as a comment on the issue/PR. You MUST always end with a clear, well-formatted markdown summary of what you did, what was created, and what the user should do next. Never end on a tool call without a text response — the user will see nothing if you do.

          ## Framework

          The base agent protocol is registered as the `AgentBase` component (fetch via `software-teams component get AgentBase` if you need its body verbatim).
          Your state is tracked in `.software-teams/config/state.yaml`.
          Plans live in `.software-teams/plans/`.

          ## Rules

          Check `.software-teams/rules/` for categorised team rules (backend, frontend, testing, devops, general).
          These rules layer ON TOP of the project's `.claude/CLAUDE.md` — they exist to add team conventions NOT already documented there.
          When you learn something from a review or feedback, update the appropriate rules file. Before adding a rule, verify it is not already in `.claude/CLAUDE.md` (or `./CLAUDE.md`); if it is, do NOT duplicate it in `.software-teams/rules/`.

          ## Workflow Routing

          Based on the user's request, follow the appropriate workflow:

          - **Plan requests** ("plan", "design", or ClickUp ticket URLs): Read `.software-teams/framework/agents/software-teams-planner.md` and create a plan in `.software-teams/plans/`. Present a summary and ask for feedback.
          - **Implementation** ("implement", "build", "execute"): Read the current plan from state.yaml, then run `software-teams component get ComplexityRouter` to decide single-agent vs teams mode.
          - **Quick changes** ("quick", "fix", "small"): Make minimal focused changes. Commit when done.
          - **Review** ("review"): Run `software-teams component get PRReview` for the review checklist; review PR changes against it.
          - **PR feedback** ("feedback"): Address review comments using `.software-teams/framework/agents/software-teams-pr-feedback.md`. Extract new rules from reviewer preferences (skip anything already in CLAUDE.md).
          - **"do" + ClickUp URL**: Full flow — plan from ticket, then implement.

          ## Iterative Refinement

          After completing any workflow, present a summary and ask for feedback.
          When the user provides feedback, apply changes incrementally — do not restart from scratch.
          When the user approves ("approved", "lgtm", "looks good"), finalise the work.

          ## ClickUp Integration

          If the user provides a ClickUp URL, fetch the ticket details using the ClickUp API:
          ```bash
          curl -s -H "Authorization: $CLICKUP_API_TOKEN" "https://api.clickup.com/api/v2/task/{task_id}"
          ```
          Use the ticket name, description, and checklists as requirements.

        claude_args: '--permission-mode acceptEdits --allowedTools Read,Write,Edit,MultiEdit,Glob,Grep,Task,Bash(bun:*),Bash(git:*),Bash(gh:*),Bash(npm:*),Bash(npx:*),Bash(mkdir:*),Bash(rm:*),Bash(software-teams:*),Bash(curl:*)'

      env:
        CLICKUP_API_TOKEN: ${{ inputs.clickup_api_token }}

branding:
  icon: 'zap'
  color: 'purple'
