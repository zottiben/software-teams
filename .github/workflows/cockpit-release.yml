name: Release Cockpit

# Push a tag like `cockpit-v0.1.1` and this builds, signs, notarizes, and
# publishes the macOS cockpit DMGs to a GitHub release for that tag.
on:
  push:
    tags:
      - 'cockpit-v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        # --ignore-scripts: skip native postinstall builds we don't need. The
        # monorepo pulls in isolated-vm (an n8n transitive dep) which fails to
        # compile against the runner's Node; the cockpit never loads it, and
        # node-pty works from its shipped prebuilds, so skipping build scripts is
        # safe and avoids the failing native compile.
        run: bun install --frozen-lockfile --ignore-scripts
        env:
          ELECTRON_SKIP_BINARY_DOWNLOAD: '1'

      - name: Version from tag
        id: meta
        run: echo "version=${GITHUB_REF_NAME#cockpit-v}" >> "$GITHUB_OUTPUT"

      - name: Write App Store Connect API key
        run: |
          printf '%s' "$APPLE_API_KEY_BASE64" | base64 --decode > "$RUNNER_TEMP/AuthKey.p8"
        env:
          APPLE_API_KEY_BASE64: ${{ secrets.APPLE_API_KEY_BASE64 }}

      - name: Build, sign, and notarize
        working-directory: apps/electron
        run: bun run dist
        env:
          # Signing — base64 of the Developer ID Application .p12 + its password.
          CSC_LINK: ${{ secrets.MAC_CSC_LINK }}
          CSC_KEY_PASSWORD: ${{ secrets.MAC_CSC_KEY_PASSWORD }}
          # Notarization — App Store Connect API key.
          APPLE_API_KEY: ${{ runner.temp }}/AuthKey.p8
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          name: Software Teams Cockpit ${{ steps.meta.outputs.version }}
          fail_on_unmatched_files: true
          files: |
            apps/electron/release/*.dmg
            apps/electron/release/*.zip
            apps/electron/release/*.blockmap
            apps/electron/release/latest-mac.yml
          body: |
            macOS desktop cockpit for Software Teams — signed + notarized.

            **Install:** open the DMG for your chip (`…-arm64.dmg` Apple Silicon, `…-x64.dmg` Intel) and drag to Applications.

            **Requires** `claude` (Claude Code, authenticated) and `node` on your PATH.
