name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Activates the BENCH_ASSERT-gated test in
      # src/benchmarks/component-cost.test.ts which checks the most recent
      # `from-resolved` benchmark entry against the projected 42,009-token
      # ceiling within ±5%. Flipped on as part of plan 4-01-T5 once the
      # post-audit measurement was confirmed inside the soft-fail band.
      BENCH_ASSERT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - run: bun test

  component-validate:
    # Validates the @ST: component registry: every section's `requires`
    # resolves, the dep graph is acyclic, and every @ST: tag in framework
    # markdown points at a real component+section. The MD↔TS drift step
    # was retired in plan 3-02 alongside the markdown component layer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - name: Component registry validation
        run: bun run dist/index.js component validate
