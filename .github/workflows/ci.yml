name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Activates the BENCH_ASSERT-gated test in
      # src/benchmarks/component-cost.test.ts which checks the most recent
      # `from-resolved` benchmark entry against the projected 42,009-token
      # ceiling within ±5%. Flipped on as part of plan 4-01-T5 once the
      # post-audit measurement was confirmed inside the soft-fail band.
      BENCH_ASSERT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - run: bun install

      - run: bun run build

      - name: Bundle stub-detector
        # Bun's `--target bun` bundler has historically (1.3.13) emitted empty
        # `var {existsSync} = (() => ({}))` stubs when it loses track of
        # node:* imports. The stubs typecheck fine and tests pass, but every
        # CLI command crashes at runtime. Fail CI loudly if any stub appears.
        run: |
          if grep -qE '= \(\(\) => \(\{\}\)\)' dist/index.js; then
            echo "::error::Bundle contains empty-object stubs from a bundler regression."
            grep -n '= (() => ({}))' dist/index.js | head -10
            exit 1
          fi

      - name: Bundle smoke test (init runs end-to-end)
        # Tests pass against source. The bundle is a separate artifact and
        # has shipped broken before. This step exercises the actual published
        # entrypoint so we catch bundle-only regressions before publish.
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          bun "$GITHUB_WORKSPACE/dist/index.js" init --ci

      - run: bun test

  component-validate:
    # Validates the @ST: component registry: every section's `requires`
    # resolves, the dep graph is acyclic, and every @ST: tag in framework
    # markdown points at a real component+section. The MD↔TS drift step
    # was retired in plan 3-02 alongside the markdown component layer.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - run: bun install

      - run: bun run build

      - name: Component registry validation
        run: bun run dist/index.js component validate
