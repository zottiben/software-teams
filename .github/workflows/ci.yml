name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Activates the BENCH_ASSERT-gated test in
      # src/benchmarks/component-cost.test.ts which checks the most recent
      # `from-resolved` benchmark entry against the projected 42,009-token
      # ceiling within ±5%. Flipped on as part of plan 4-01-T5 once the
      # post-audit measurement was confirmed inside the soft-fail band.
      BENCH_ASSERT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - run: bun test

  component-drift-check:
    # Replaces the old plugin-drift-check job. Plugin tree (agents/+commands/)
    # is now the source of truth — no generator, no drift to assert. Job retained
    # to keep the @ST: component registry's MD↔TS drift + validate gates running.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install

      - run: bun run build

      - name: Check for component MD↔TS drift
        run: bun run dist/index.js component drift

      - name: Component registry validation
        run: bun run dist/index.js component validate
