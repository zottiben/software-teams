name: Publish @websitelabs/software-teams to npm

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  # Dry-run job: runs on every PR to validate the publish path before T16
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      # Release rule: dist/index.js must always be built and committed together
      # with a version bump. If the committed bundle is stale or missing, this
      # step fails the PR before it can reach publish/tag.
      - name: Dist lockstep guard (committed bundle must match freshly built bundle)
        run: |
          if ! git ls-files --error-unmatch dist/index.js > /dev/null 2>&1; then
            echo "::error::dist/index.js is not committed. Run 'bun run build' and commit dist/index.js alongside the version bump before opening a release PR."
            exit 1
          fi
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "::error::Committed dist/index.js is out of sync with the freshly built bundle. Run 'bun run build', commit the updated dist/index.js, and push again."
            git diff --stat dist/index.js
            exit 1
          fi
          echo "dist/index.js is committed and in sync with the freshly built bundle."

      - uses: actions/setup-node@v6
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - name: Dry-run publish (@websitelabs/software-teams)
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 2

      # Only publish if package.json version changed
      - name: Check version change
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json | jq -r .version)
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT) — skipping publish"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          fi

      # Fail fast if package.json version != plugin.json version (keeps artefacts in lockstep)
      - name: Version lockstep check (package.json == .claude-plugin/plugin.json)
        if: steps.version.outputs.changed == 'true'
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: version mismatch — package.json=$PKG_VERSION but .claude-plugin/plugin.json=$PLUGIN_VERSION"
            echo "Bump both files to the same version before publishing."
            exit 1
          fi
          echo "Versions in lockstep: $PKG_VERSION"

      - uses: oven-sh/setup-bun@v2
        if: steps.version.outputs.changed == 'true'
        with:
          bun-version: "1.3.7"

      - run: bun install --frozen-lockfile
        if: steps.version.outputs.changed == 'true'

      - run: bun run build
        if: steps.version.outputs.changed == 'true'

      # Release rule: dist/index.js must always be built and committed together
      # with a version bump. CI catches any case where the committed bundle is
      # stale or missing before publish/tag runs. To comply: run 'bun run build'
      # and commit dist/index.js in the same commit as the version bump.
      - name: Dist lockstep guard (committed bundle must match freshly built bundle)
        if: steps.version.outputs.changed == 'true'
        run: |
          if ! git ls-files --error-unmatch dist/index.js > /dev/null 2>&1; then
            echo "::error::dist/index.js is not committed. Run 'bun run build' and commit dist/index.js alongside the version bump — refusing to publish."
            exit 1
          fi
          if [ -n "$(git status --porcelain dist/index.js)" ]; then
            echo "::error::Committed dist/index.js is out of sync with the freshly built bundle — refusing to publish. Run 'bun run build', commit the updated dist/index.js, and push again."
            git diff --stat dist/index.js
            exit 1
          fi
          echo "dist/index.js is committed and in sync with the freshly built bundle."

      - name: Bundle stub-detector (block broken bundle from publish)
        if: steps.version.outputs.changed == 'true'
        # Bun's bundler has shipped builds that emit empty `var {existsSync} =
        # (() => ({}))` stubs. Tests pass against source, so these slip through
        # without an explicit bundle check. Fail the publish loudly if any are
        # present.
        run: |
          if grep -qE '= \(\(\) => \(\{\}\)\)' dist/index.js; then
            echo "::error::Bundle contains empty-object stubs — refusing to publish."
            grep -n '= (() => ({}))' dist/index.js | head -10
            exit 1
          fi

      - name: Bundle smoke test (init runs end-to-end + UTF-8 sanity)
        if: steps.version.outputs.changed == 'true'
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          bun "$GITHUB_WORKSPACE/dist/index.js" init --ci
          # UTF-8 mojibake guard: Bun has shipped builds that mis-decode
          # multi-byte string literals at runtime (UTF-8 → Latin-1 → UTF-8),
          # producing files with `c3 a2 c2 86 c2 92` where they should have
          # `e2 86 92`. Catch any such double-encoded sequences in the
          # generated CLAUDE.md / agents / templates.
          if find . -name '*.md' -exec sh -c 'xxd "$1" | grep -q "c3a2 c286"' _ {} \; -print | grep .; then
            echo "::error::Generated files contain UTF-8 mojibake (double-encoded characters)."
            exit 1
          fi

      - run: bun run test
        if: steps.version.outputs.changed == 'true'

      - uses: actions/setup-node@v6
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: npm publish --access public --provenance
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a git tag and GitHub Release
      - name: Tag and release
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
