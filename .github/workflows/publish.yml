name: Publish @websitelabs/software-teams to npm

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: write
  id-token: write

jobs:
  # Dry-run job: runs on every PR to validate the publish path before T16
  dry-run:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.3.7"

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - name: Dry-run publish (@websitelabs/software-teams)
        run: npm publish --dry-run
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  publish:
    if: github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      # Only publish if package.json version changed
      - name: Check version change
        id: version
        run: |
          CURRENT=$(jq -r .version package.json)
          PREVIOUS=$(git show HEAD~1:package.json | jq -r .version)
          if [ "$CURRENT" = "$PREVIOUS" ]; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "Version unchanged ($CURRENT) — skipping publish"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "version=$CURRENT" >> "$GITHUB_OUTPUT"
            echo "Version changed: $PREVIOUS → $CURRENT"
          fi

      # Fail fast if package.json version != plugin.json version (keeps artefacts in lockstep)
      - name: Version lockstep check (package.json == .claude-plugin/plugin.json)
        if: steps.version.outputs.changed == 'true'
        run: |
          PKG_VERSION=$(jq -r .version package.json)
          PLUGIN_VERSION=$(jq -r .version .claude-plugin/plugin.json)
          if [ "$PKG_VERSION" != "$PLUGIN_VERSION" ]; then
            echo "ERROR: version mismatch — package.json=$PKG_VERSION but .claude-plugin/plugin.json=$PLUGIN_VERSION"
            echo "Bump both files to the same version before publishing."
            exit 1
          fi
          echo "Versions in lockstep: $PKG_VERSION"

      - uses: oven-sh/setup-bun@v2
        if: steps.version.outputs.changed == 'true'
        with:
          bun-version: "1.3.7"

      - run: bun install --frozen-lockfile
        if: steps.version.outputs.changed == 'true'

      - run: bun run build
        if: steps.version.outputs.changed == 'true'

      - name: Bundle stub-detector (block broken bundle from publish)
        if: steps.version.outputs.changed == 'true'
        # Bun's bundler has shipped builds that emit empty `var {existsSync} =
        # (() => ({}))` stubs. Tests pass against source, so these slip through
        # without an explicit bundle check. Fail the publish loudly if any are
        # present.
        run: |
          if grep -qE '= \(\(\) => \(\{\}\)\)' dist/index.js; then
            echo "::error::Bundle contains empty-object stubs — refusing to publish."
            grep -n '= (() => ({}))' dist/index.js | head -10
            exit 1
          fi

      - name: Bundle smoke test (init runs end-to-end)
        if: steps.version.outputs.changed == 'true'
        run: |
          set -e
          tmp=$(mktemp -d)
          cd "$tmp"
          bun "$GITHUB_WORKSPACE/dist/index.js" init --ci

      - run: bun run test
        if: steps.version.outputs.changed == 'true'

      - uses: actions/setup-node@v4
        if: steps.version.outputs.changed == 'true'
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org

      - run: npm publish --access public --provenance
        if: steps.version.outputs.changed == 'true'
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      # Create a git tag and GitHub Release
      - name: Tag and release
        if: steps.version.outputs.changed == 'true'
        run: |
          git tag "v${{ steps.version.outputs.version }}"
          git push origin "v${{ steps.version.outputs.version }}"
          gh release create "v${{ steps.version.outputs.version }}" \
            --title "v${{ steps.version.outputs.version }}" \
            --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}
