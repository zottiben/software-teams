# Software Teams Global Configuration
# Edit these settings to customise Software Teams behaviour

version: "1.0.0"

# ─────────────────────────────────────────────────────────────────────────────
# Workflow Settings
# ─────────────────────────────────────────────────────────────────────────────
workflow:
  # Mode: yolo (autonomous) | interactive (confirm gates) | strict (all confirmations)
  mode: yolo

  # Depth: shallow | standard | deep (affects task granularity)
  depth: standard

  # Enable parallel plan execution within waves
  parallelisation: true

  # Commit planning docs to git
  commit_docs: true

# ─────────────────────────────────────────────────────────────────────────────
# Agent Toggles
# ─────────────────────────────────────────────────────────────────────────────
agents:
  # Run research phase before planning
  research: true

  # Validate plans before execution
  plan_check: true

  # Verify outcomes after execution
  verifier: true

# ─────────────────────────────────────────────────────────────────────────────
# Model Routing
# ─────────────────────────────────────────────────────────────────────────────
#
# EXTENDED PROFILE SHAPE (multi-provider, introduced in T4)
# ──────────────────────────────────────────────────────────
# Profile entries accept TWO shapes (both are valid for at least one minor version):
#
#   Legacy bare string (backward-compatible):
#     planner: opus        # → { provider: anthropic, model_tier: large }
#     verifier: sonnet     # → { provider: anthropic, model_tier: medium }
#     researcher: haiku    # → { provider: anthropic, model_tier: small }
#
#   New object form (multi-provider):
#     planner:
#       provider: openai
#       model_tier: large  # → gpt-4o
#     programmer:
#       provider: xai
#       model_tier: medium # → grok-3-mini-beta
#     researcher:
#       provider: moonshot
#       model_tier: large  # → kimi-k2.6
#
# Supported providers : anthropic | openai | xai | moonshot
# Model tiers         : large (frontier) | medium (balanced) | small (fast/cheap)
#
# Tier → concrete model mapping (current as of 2026-05):
#   anthropic : large=claude-opus-4-7 / medium=claude-sonnet-4-5 / small=claude-haiku-3-5
#   openai    : large=gpt-4o          / medium=gpt-4o-mini        / small=gpt-4o-mini (alias)
#   xai       : large=grok-4.3        / medium=grok-3-mini-beta   / small=grok-3-mini-beta (alias)
#   moonshot  : large=kimi-k2.6       / medium=kimi-k2.5          / small=kimi-k2.5 (alias)
#
# Required env vars per provider:
#   anthropic → ANTHROPIC_API_KEY (already set for existing users)
#   openai    → OPENAI_API_KEY
#   xai       → XAI_API_KEY
#   moonshot  → MOONSHOT_API_KEY
#
# Overrides section: set an agent to a non-null value to override its profile entry.
#   overrides:
#     planner: { provider: openai, model_tier: large }
#
# The existing balanced/quality/budget profiles below are UNCHANGED — existing
# Anthropic users see zero behaviour change (R-01 invariant).
# ──────────────────────────────────────────────────────────
models:
  # Active profile: quality | balanced | budget
  profile: balanced

  # Profile definitions (agent -> model mapping)
  profiles:
    # Maximum reasoning power, use for critical work (~100% token baseline)
    quality:
      planner: opus
      architect: opus
      programmer: opus
      verifier: sonnet
      researcher: sonnet
      phase_researcher: sonnet
      plan_checker: sonnet
      debugger: opus
      quality: sonnet

    # Smart allocation for typical development (~40% less than quality)
    balanced:
      planner: opus
      architect: opus
      programmer: sonnet
      verifier: sonnet
      researcher: sonnet
      phase_researcher: sonnet
      plan_checker: sonnet
      debugger: sonnet
      quality: sonnet

    # Minimal opus usage, conserve quota (~60% less than quality)
    budget:
      planner: sonnet
      architect: sonnet
      programmer: sonnet
      verifier: haiku
      researcher: haiku
      phase_researcher: haiku
      plan_checker: haiku
      debugger: sonnet
      quality: haiku

  # Override specific agents (null = use profile default)
  overrides:
    planner: null
    programmer: null
    verifier: null
    researcher: null

# ─────────────────────────────────────────────────────────────────────────────
# Default Paths and Values
# ─────────────────────────────────────────────────────────────────────────────
defaults:
  branch_prefix: "feature/"
  commit_types:
    - feat
    - fix
    - refactor
    - docs
    - test
    - chore
    - perf
    - style
  plan_location: .software-teams/plans
  state_location: .software-teams
  thoughts_location: .software-teams/thoughts

# ─────────────────────────────────────────────────────────────────────────────
# Git Settings
# ─────────────────────────────────────────────────────────────────────────────
git:
  # Automatically stage changes before commit
  auto_stage: false

  # Require clean worktree before operations
  require_clean_worktree: false

  # Branches that cannot be directly modified
  protected_branches:
    - main
    - master
    - develop

# ─────────────────────────────────────────────────────────────────────────────
# Quality Gates
# ─────────────────────────────────────────────────────────────────────────────
quality:
  # Run linter before each commit
  run_lint_before_commit: true

  # Run tests before creating PR
  run_tests_before_pr: true

  # Require verification pass before marking complete
  require_verification: true

# ─────────────────────────────────────────────────────────────────────────────
# Context Management
# ─────────────────────────────────────────────────────────────────────────────
context:
  # Maximum files to include per task context
  max_files_per_task: 5

  # Number of tasks before recommending split
  split_threshold_tasks: 3

  # Context budget thresholds (0.0 - 1.0)
  context_budget_warning: 0.5   # Yellow zone
  context_budget_critical: 0.7  # Red zone

# ─────────────────────────────────────────────────────────────────────────────
# UI Settings
# ─────────────────────────────────────────────────────────────────────────────
ui:
  # Show progress banners during execution
  show_progress_banners: true

  # Enable verbose output
  verbose_mode: false

  # Use emoji in output (disabled for cleaner logs)
  emoji_enabled: false
